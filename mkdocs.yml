site_name: Coo-Cah Kitchen Electronics Factory
site_description: >
  Tier 2 Consumer Electronics — Blueprint, operational docs & AI-integration specs for the
  Coo-Cah Kitchen Electronics Factory (Agbara/Sagamu, Lagos/Ogun State, Nigeria).
  Manufactures refrigerators, microwaves, electric cookers, blenders & domestic appliances.
site_url: https://oumar-code.github.io/coo-cah-factory-electronics-kitchen/
repo_url: https://github.com/oumar-code/coo-cah-factory-electronics-kitchen
repo_name: oumar-code/coo-cah-factory-electronics-kitchen
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Master Repo Reference: master-repo-ref.md
  - Implementation Plan: implementation-plan.md
  - Factory Docs:
    - Machinery & Equipment: machinery.md
    - Energy Profile: energy-profile.md
    - Floor Plan: floor-plan.md
    - Automation Roadmap: automation-roadmap.md
    - Supply Chain: supply-chain.md
    - Intragroup Supply Coordination: intragroup-supply-coordination.md
    - Regulatory & Compliance: regulatory.md
    - CapEx / OpEx: capex-opex.md
    - Digital Twin: digital-twin.md
    - MES Integration: mes-integration.md
  - Gate & Implementation Readiness:
    - Gap Closure Report: gap-closure-report.md
    - AI Platform Status: ai-platform-status.md
    - Penetration Test Scoping: pentest-scoping.md
    - Sensor Registry: sensor-map.md
    - BIM:
      - Zone Boundaries: bim/zone-boundaries.md
      - Asset Anchors: bim/asset-anchors.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/oumar-code/Coo-Kah-Doks
      name: Master Repository — Coo-Kah-Doks

extra_css:
  - stylesheets/extra.css

copyright: >
  © 2025 Coo-Cah Technologies Holdings. All rights reserved. |
  Part of the Coo-Cah Manufacturing Ecosystem.
