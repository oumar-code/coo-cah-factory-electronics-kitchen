name: Receive Blueprint Update from Master Repo

on:
  repository_dispatch:
    types: [blueprint-update]

jobs:
  open-sync-issue:
    name: Open blueprint sync tracking issue
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create tracking issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const payload     = context.payload.client_payload;
            const sourceRepo  = payload.source_repo  || 'oumar-code/Coo-Kah-Doks';
            const commitSha   = payload.ref          || 'unknown';
            const actor       = payload.actor        || 'unknown';
            const reason      = payload.reason       || 'Blueprint template updated';
            const triggeredAt = payload.triggered_at || new Date().toISOString();
            const shortSha    = commitSha.substring(0, 7);

            const body = [
              `## 📣 Blueprint Template Updated`,
              ``,
              `The master blueprint template in <a href="https://github.com/${sourceRepo}">${sourceRepo}</a> ` +
              `was updated and this factory repo needs to be reviewed for alignment.`,
              ``,
              `| Field | Value |`,
              `|-------|-------|`,
              `| Source repo | \`${sourceRepo}\` |`,
              `| Commit | <a href="https://github.com/${sourceRepo}/commit/${commitSha}">\`${shortSha}\`</a> |`,
              `| Triggered by | \`${actor}\` |`,
              `| Triggered at | ${triggeredAt} |`,
              `| Reason | ${reason} |`,
              ``,
              `## Checklist`,
              ``,
              `- <a href="https://github.com/${sourceRepo}/tree/main/factories/_template"> ] Review changes in [\`factories/_template/\`</a> on the master repo`,
              `- [ ] Identify any sections in this factory's \`docs/\` that should be updated to match`,
              `- [ ] Apply relevant updates to this factory repo`,
              `- [ ] Close this issue once aligned`,
            ].join('\n');

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `📣 Blueprint Update Available — sync from master (${shortSha})`,
              body,
              labels: ['blueprint-sync'],
            });

            console.log(`✅ Created issue #${issue.number}: ${issue.html_url}`);
