name: Lint Diagrams

on:
  push:
    branches:
      - main
      - "copilot/**"
  pull_request:
    branches:
      - main

jobs:
  lint-mermaid:
    name: Lint Mermaid Diagrams
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Extract and lint Mermaid diagrams
        run: |
          set -e
          ERROR=0
          TMPDIR=$(mktemp -d)

          # Find all markdown files
          while IFS= read -r -d '' mdfile; do
            echo "Checking: $mdfile"

            # Extract mermaid blocks using awk
            awk '
              /^```mermaid$/ { capture=1; block=""; next }
              capture && /^```$/ {
                capture=0
                fname=TMPDIR "/" NR ".mmd"
                print block > fname
                print fname
                next
              }
              capture { block = block "\n" $0 }
            ' TMPDIR="$TMPDIR" "$mdfile" | while IFS= read -r mmdfile; do
              if [ -f "$mmdfile" ]; then
                echo "  Validating diagram: $mmdfile"
                if ! mmdc -i "$mmdfile" -o /dev/null 2>&1; then
                  echo "  ERROR: Invalid Mermaid diagram in $mdfile (near line indicated above)"
                  ERROR=1
                fi
              fi
            done

          done < <(find . -name "*.md" -not -path "./.git/*" -print0)

          rm -rf "$TMPDIR"
          exit $ERROR

  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Run markdownlint
        run: |
          markdownlint \
            --config .markdownlint.yml \
            "**/*.md" \
            --ignore node_modules \
            --ignore ".git" \
            || true
        # '|| true' used because some formatting warnings are acceptable;
        # adjust to remove '|| true' once all docs conform to the style guide.

  validate-mkdocs:
    name: Validate MkDocs Config
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MkDocs and dependencies
        run: |
          pip install mkdocs mkdocs-material pymdown-extensions mkdocs-mermaid2-plugin

      - name: Validate MkDocs build
        run: |
          mkdocs build --strict --site-dir /tmp/mkdocs-site
          echo "MkDocs build succeeded."
